    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#020617" flood-opacity="0.55" />
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#67e8f9" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#background)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <g filter="url(#shadow)" transform="translate(346 315)">
    <circle r="154" fill="url(#brand)" />
    <circle r="48.125" fill="#020617" />
    <circle cx="73.92" r="24.06" fill="#07101c" />
