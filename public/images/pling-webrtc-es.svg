<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Pling">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#020617" />
      <stop offset="0.58" stop-color="#071b2d" />
      <stop offset="1" stop-color="#0f3a42" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(330 210) rotate(30) scale(570 440)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399" stop-opacity="0.32" />
      <stop offset="0.48" stop-color="#22d3ee" stop-opacity="0.12" />
      <stop offset="1" stop-color="#020617" stop-opacity="0" />
